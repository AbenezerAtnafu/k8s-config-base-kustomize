apiVersion: v1
kind: ResourceQuota
metadata:
  name: app-dev-quota
  labels:
    app.kubernetes.io/part-of: bsis
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/environment: dev
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 3Gi
    limits.cpu: "8"
    limits.memory: 6Gi
    pods: "25"
    services: "10"
    configmaps: "25"
    secrets: "40"
