apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bsis-app-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: bsis-app-secrets
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: bsis
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vault-secret-store
  target:
    name: bsis-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_URL
      remoteRef:
        key: bsis/development/app
        property: DB_URL
    - secretKey: JWT_SECRET
      remoteRef:
        key: bsis/development/app
        property: JWT_SECRET
