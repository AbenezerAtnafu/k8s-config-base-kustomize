apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app-prod

resources:
  - ../../base
  - namespace.yaml
  - resourcequota.yaml
  - secretstore-vault.yaml
  - externalsecret-bsis-app.yaml

images:
  - name: ghcr.io/habtec/bsis-app
    newTag: prod-latest

patchesStrategicMerge:
  - patch-deployment.yaml
  - patch-ingress.yaml
  - patch-hpa.yaml
