apiVersion: v1
kind: ResourceQuota
metadata:
  name: app-prod-quota
  labels:
    app.kubernetes.io/part-of: bsis
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/environment: prod
spec:
  hard:
    requests.cpu: "6"
    requests.memory: 8Gi
    limits.cpu: "20"
    limits.memory: 16Gi
    pods: "80"
    services: "30"
    configmaps: "80"
    secrets: "120"
