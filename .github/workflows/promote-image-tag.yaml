name: Promote Image Tag

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to promote to (stage|prod)"
        required: true
        type: choice
        options:
          - stage
          - prod
      image_tag:
        description: "Immutable image tag to deploy"
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        uses: mikefarah/yq@v4.44.5

      - name: Update target overlay tag
        run: |
          overlay="apps/overlays/${TARGET_ENV}/kustomization.yaml"
          yq -i '(.images[] | select(.name == "ghcr.io/habtec/bsis-app")).newTag = strenv(IMAGE_TAG)' "$overlay"
          echo "overlay=$overlay" >> "$GITHUB_OUTPUT"
        env:
          TARGET_ENV: ${{ inputs.target_environment }}
          IMAGE_TAG: ${{ inputs.image_tag }}

      - name: Commit and push promotion
        run: |
          if git diff --quiet; then
            echo "No promotion changes detected."
            exit 0
          fi
          git add "apps/overlays/${TARGET_ENV}/kustomization.yaml"
          git commit -m "chore(deploy): promote ${TARGET_ENV} to ${IMAGE_TAG}"
          git push
        env:
          TARGET_ENV: ${{ inputs.target_environment }}
          IMAGE_TAG: ${{ inputs.image_tag }}
