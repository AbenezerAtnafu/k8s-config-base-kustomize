apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-default-limits
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: bsis
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: observability
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      default:
        cpu: 1
        memory: 1Gi
